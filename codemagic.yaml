# Mami Key iOS — Codemagic App Store
# 模板来源：E:\apps\hello me\codemagic.yaml（原生 Swift 适配版）
# 新 App 只改 PER-APP CONFIG；证书 app-common 共用。

workflows:
  mami-key-ios-appstore:
    # ═══════════════════════════════════════════════════════════════════
    #  PER-APP CONFIG
    # ═══════════════════════════════════════════════════════════════════
    name: Mami Key iOS App Store                              # 1. 工作流显示名

    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: huanqi-asc                         # 2. ASC 集成名

    environment:
      ios_signing:
        provisioning_profiles:
          - mamikey-appstore                                # 3a. 主 App 描述文件
          - mamikey-keyboard-appstore                       # 3b. 键盘扩展描述文件
        certificates:
          - app-common                                      # 共用，不改
      vars:
        BUNDLE_ID: io.github.YaoHuan123.mami-key            # 4. 主 App Bundle ID
        BUNDLE_ID_KEYBOARD: io.github.YaoHuan123.mami-key.keyboard
        APP_GROUP: group.io.github.YaoHuan123.mami-key
        XCODE_SCHEME: MamiKey
        XCODE_PROJECT_DIR: ios
        APP_VERSION: "0.1.0"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: ios
          include: true

    scripts:
      - name: Prepare native iOS project
        script: |
          set -e
          chmod +x scripts/codemagic-prebuild.sh
          ./scripts/codemagic-prebuild.sh
          echo "=== Bundle IDs ==="
          grep -E "PRODUCT_BUNDLE_IDENTIFIER|com.apple.security.application-groups" -n \
            "$CM_BUILD_DIR/ios/MamiKey.xcodeproj/project.pbxproj" \
            "$CM_BUILD_DIR/ios/MamiKey/MamiKey.entitlements" \
            "$CM_BUILD_DIR/ios/MamiKeyKeyboard/MamiKeyKeyboard.entitlements" || true

      - name: Set up code signing on Xcode project
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project use-profiles
          if [ ! -f "$HOME/export_options.plist" ]; then
            echo "export_options.plist not generated by use-profiles" >&2
            exit 1
          fi
          if /usr/libexec/PlistBuddy -c "Print :method" "$HOME/export_options.plist" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Set :method app-store" "$HOME/export_options.plist"
          else
            /usr/libexec/PlistBuddy -c "Add :method string app-store" "$HOME/export_options.plist"
          fi
          echo "=== export_options.plist ==="
          cat "$HOME/export_options.plist"

      - name: Build App Store IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          xcode-project build-ipa \
            --project "MamiKey.xcodeproj" \
            --scheme "$XCODE_SCHEME" \
            --export-options-plist "$HOME/export_options.plist"
          ls -la build/ios/ipa/

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
